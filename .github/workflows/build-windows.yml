name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows NSIS Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KeyForge v__VERSION__'
          releaseBody: |
            ## KeyForge v__VERSION__

            ### Windows 安装包

            下载下方安装包即可安装。

            #### 系统要求
            - Windows 10 (1803+) / Windows 11
            - 无需额外安装任何运行环境

            #### 安装说明
            1. 下载安装包
            2. 双击运行安装程序
            3. 按照安装向导完成安装
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyForge-windows-installer
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Verify installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            Write-Host "Installer created: $($installer.Name)"
            Write-Host "Size: $([math]::Round($installer.Length / 1MB, 2)) MB"
          } else {
            Write-Host "No installer found"
            exit 1
          }
